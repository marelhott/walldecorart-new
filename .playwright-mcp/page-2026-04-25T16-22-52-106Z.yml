    - paragraph [ref=e45]: K realizaci interiéru přistupujeme stejně jako k uměleckému dílu. Kreativita a důvtipná praktičnost jsou dvěma hlavními pilíři naší práce. Zároveň máme na paměti, že i s malou investicí může skvělý nápad proměnit váš prostor v zajímavé místo k životu. Administrativní a kreativní jádro firmy tvoří Marek a Terezie — dva lidé, kteří za každým projektem stojí od první konzultace po předání hotové realizace.
